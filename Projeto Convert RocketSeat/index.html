<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convert</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <img src="./img/logo.svg" alt="Convert logo" />
    </header>

    <main>
        <form>
            <label for="amount">Valor</label>
            <input type="number" name="amount" id="amount" placeholder="0" required min="1" step="any" />

            <label for="currency">Moeda</label>
            <select name="currency" id="currency" required>
                <option value="" disabled selected hidden>Selecione a moeda</option>
                <option value="USD">Dólar Americano</option>
                <option value="EUR">Euro</option>
                <option value="GBP">Libra Esterlina</option>
            </select>

            <button type="submit">Converter em reais</button>
        </form>

        <footer id="footer">
            <span id="description">US$ 1 = R$ 4,86</span>
            <h1 id="result">486,00 Reais</h1>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
